name: CI

on:
  push:
    branches: [main, fixes]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: bfs-dispatch

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: bfs-dispatch/package-lock.json

      - run: npm ci

      - run: npx tsc --noEmit
        name: TypeScript check

      - run: npx vitest run
        name: Tests

      - run: npm run build
        name: Build
